<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Aperio Agent Workbench</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="sidebar" aria-label="Navigation">
        <div class="brand">
          <div class="brand-mark">A</div>
          <div>
            <h1>Aperio</h1>
            <p>Agent Workbench</p>
          </div>
        </div>

        <button class="nav-primary" id="newChatBtn" type="button">
          <span class="nav-icon" aria-hidden="true">＋</span>
          <span>新对话</span>
        </button>

        <a class="nav-primary nav-link" href="/observability">
          <span class="nav-icon" aria-hidden="true">◎</span>
          <span>观测平台</span>
        </a>

        <div class="nav-section">
          <p>快捷任务</p>
          <button data-example="我在珠海，明天天气如何？要带伞吗？">
            <span class="nav-icon" aria-hidden="true">☁</span>
            <span>天气问答</span>
          </button>
          <button data-example="为「智慧校园导航助手」写一份 PRD 并评审。它是一款基于 AR/语音的校内导航 App，帮助新生和访客快速找到教室和设施，同时提供校园活动推荐和实时拥挤度信息。">
            <span class="nav-icon" aria-hidden="true">□</span>
            <span>PRD 评审</span>
          </button>
          <button data-example="对当前项目做一次代码健康检查。">
            <span class="nav-icon" aria-hidden="true">⌁</span>
            <span>代码体检</span>
          </button>
        </div>

        <div class="nav-section muted-list">
          <div id="recentSessions" class="recent-sessions"></div>
          <p>最近</p>
          <span>智慧校园 PRD</span>
          <span>代码健康检查</span>
          <span>天气与出行建议</span>
        </div>
      </section>

      <section class="workspace" aria-label="Chat workspace">
        <div class="topbar">
          <button class="icon-button rail-toggle" id="railToggle" type="button" aria-label="折叠侧栏">
            <span aria-hidden="true">☰</span>
          </button>
          <div>
            <h2>新对话</h2>
            <p class="top-hint">AI 生成内容请谨慎核实</p>
          </div>
          <div class="top-actions">
            <button class="icon-button" id="artifactToggle" type="button" aria-label="打开产物面板">
              <span aria-hidden="true">▣</span>
            </button>
            <button class="icon-button" id="settingsToggle" type="button" aria-expanded="false" aria-controls="settingsPanel">
              <span aria-hidden="true">⚙</span>
            </button>
            <button class="ghost" id="clearBtn" type="button">清空</button>
          </div>
          <div class="settings-panel" id="settingsPanel" hidden>
            <label for="approvalMode">审批模式</label>
            <select id="approvalMode">
              <option value="approve" selected>自动批准</option>
              <option value="reject">自动拒绝</option>
            </select>
            <label for="timeoutSeconds">超时秒数</label>
            <input id="timeoutSeconds" type="number" min="30" max="3600" value="900" />
          </div>
        </div>

        <div class="conversation" id="conversation">
          <div class="welcome" id="welcomePanel">
            <h2>有什么我能帮你的吗？</h2>
            <div class="suggestions">
              <button data-example="为「智慧校园导航助手」写一份 PRD 并评审。">
                <span aria-hidden="true">□</span>
                写 PRD 并评审
              </button>
              <button data-example="对当前项目做一次代码健康检查。">
                <span aria-hidden="true">⌁</span>
                检查代码健康
              </button>
              <button data-example="我在珠海，明天天气如何？要带伞吗？">
                <span aria-hidden="true">☁</span>
                查询天气建议
              </button>
            </div>
          </div>
          <article class="message assistant">
            <div class="avatar">AI</div>
            <div class="bubble">
              <p>输入一个任务，我会调用本地 Aperio agent，并在完成后展示回答、运行目录和产物预览。</p>
            </div>
          </article>
        </div>

        <form class="composer" id="chatForm">
          <div class="composer-status">
            <span class="status-dot" id="statusDot"></span>
            <strong id="statusText">连接中</strong>
            <span id="statusDetail">检查本地服务</span>
          </div>
          <textarea id="messageInput" rows="4" placeholder="例如：为智慧校园导航助手写 PRD 并评审"></textarea>
          <div class="composer-actions">
            <span id="runMeta">等待任务</span>
            <button id="sendBtn" type="submit">运行</button>
          </div>
        </form>
      </section>

      <aside class="artifacts" id="artifactPanel" aria-label="Artifacts">
        <div class="artifact-head">
          <div>
            <p class="eyebrow">Trace Console</p>
            <h2>运行台</h2>
          </div>
          <div class="artifact-actions">
            <span id="runId">未运行</span>
            <button class="icon-button" id="observeRefresh" type="button" aria-label="刷新观测">
              <span aria-hidden="true">↻</span>
            </button>
            <button class="icon-button" id="artifactClose" type="button" aria-label="收起产物面板">
              <span aria-hidden="true">›</span>
            </button>
          </div>
        </div>
        <div class="panel-tabs" role="tablist" aria-label="运行台视图">
          <button class="panel-tab active" id="artifactTab" type="button">产物</button>
          <button class="panel-tab" id="observeTab" type="button">观测</button>
        </div>
        <div class="panel-page active" id="artifactPage">
          <div id="artifactList" class="artifact-list">
            <div class="empty-state">完成一次任务后，这里会显示 Markdown 报告和性能文件。</div>
          </div>
        </div>
        <div class="panel-page" id="observePage">
          <div class="observe-summary" id="observeSummary">
            <div class="metric"><span>模型</span><strong>0</strong></div>
            <div class="metric"><span>工具</span><strong>0</strong></div>
            <div class="metric"><span>Token</span><strong>0</strong></div>
          </div>
          <div class="observe-layout">
            <div class="run-list" id="runList">
              <div class="empty-state">暂无运行记录。</div>
            </div>
            <div class="event-list" id="eventList">
              <div class="empty-state">选择一次运行查看模型、工具和事件。</div>
            </div>
          </div>
        </div>
      </aside>
    </main>
    <script src="/static/vendor/lucide/lucide.min.js"></script>
    <script src="/static/app.js"></script>
  </body>
</html>
